models:
  - name: slv_stg_olist__product_category
    description: Cleaned product category names, trimmed and standardized.
    columns:
      - name: local_name
        description: Product category name in Portuguese.
      - name: english_name
        description: Product category name in English.

  - name: slv_stg_olist__customers
    description: Cleaned and standardized customers.
    columns:
      - name: customer_basket_id
        description: "{{ doc('customer_record_id') }}"
      - name: customer_id
        description: "{{ doc('customer_unique_id') }}"
      - name: zip_code_prefix
        description: "{{ doc('zip_code_prefix') }}"
      - name: city
        description: "{{ doc('city_name') }}"
      - name: state_id
        description: "{{ doc('state_abbreviation') }}"

  - name: slv_stg_olist__geolocation
    description: Cleaned and standardized geolocation reference data.
    columns:
      - name: zip_code_prefix
        description: "{{ doc('zip_code_prefix') }}"
      - name: latitude
        description: Latitude coordinate.
      - name: longitude
        description: Longitude coordinate.
      - name: city
        description: "{{ doc('city_name') }}"
      - name: state_id
        description: "{{ doc('state_abbreviation') }}"

  - name: slv_stg_olist__order_items
    description: Cleaned and standardized order items.
    columns:
      - name: order_id
        description: "{{ doc('order_id') }}"
        tests:
          - relationships:
              arguments:
                to: ref('slv_stg_olist__orders')
                field: order_id
      - name: item_sequence_number
        description: Sequence number of the item within the order.
      - name: product_id
        description: "{{ doc('product_id') }}"
        tests:
          - relationships:
              arguments:
                to: ref('slv_stg_olist__products')
                field: product_id
      - name: seller_id
        description: "{{ doc('seller_id') }}"
        tests:
          - relationships:
              arguments:
                to: ref('slv_stg_olist__sellers')
                field: seller_id
      - name: shipping_limit_date
        description: Deadline for the seller to ship the item.
      - name: price
        description: Price of the item.
      - name: freight_value
        description: Freight cost charged for the item.

  - name: slv_stg_olist__order_payments
    description: Cleaned and standardized order payments.
    columns:
      - name: order_id
        description: "{{ doc('order_id') }}"
        tests:
          - relationships:
              arguments:
                to: ref('slv_stg_olist__orders')
                field: order_id
      - name: sequence_number
        description: Sequence number of the payment within the order.
      - name: type
        description: Payment method used (e.g. credit card or boleto).
      - name: installments_count
        description: Number of installments for the payment.
      - name: value
        description: Total value of the payment.

  - name: slv_stg_olist__order_reviews
    description: Cleaned and standardized order reviews.
    columns:
      - name: review_id
        description: Identifier of a review.
      - name: order_id
        description: "{{ doc('order_id') }}"
        tests:
          - relationships:
              arguments:
                to: ref('slv_stg_olist__orders')
                field: order_id
      - name: score
        description: Score given by the customer, from 1 to 5.
      - name: comment_title
        description: Title of the customer's review comment.
      - name: comment_text
        description: Body of the customer's review comment.
      - name: creation_date
        description: Date the review was created.
      - name: answer_timestamp
        description: Timestamp the review was answered.

  - name: slv_stg_olist__orders
    description: Cleaned and standardized orders.
    columns:
      - name: order_id
        description: "{{ doc('order_id') }}"
      - name: customer_basket_id
        description: "{{ doc('customer_record_id') }}"
        tests:
          - relationships:
              arguments:
                to: ref('slv_stg_olist__customers')
                field: customer_basket_id
      - name: status
        description: Current status of the order in the fulfillment process.
      - name: purchase_timestamp
        description: Timestamp the order was placed.
      - name: approved_at
        description: Timestamp the order was approved.
      - name: delivered_carrier_date
        description: Date the order was handed to the carrier.
      - name: delivered_customer_date
        description: Date the order was delivered to the customer.
      - name: estimated_delivery_date
        description: Estimated delivery date for the order.

  - name: slv_stg_olist__products
    description: Cleaned and standardized products.
    columns:
      - name: product_id
        description: "{{ doc('product_id') }}"
      - name: local_category_name
        description: Product category name in Portuguese.
        tests:
          # Points to the intermediate layer: product_category needs an extra
          # step before the relationships test can be applied.
          - relationships:
              arguments:
                to: ref('slv_int_olist__product_category')
                field: local_name
      - name: name_lenght
        description: Character length of the product name.
      - name: description_lenght
        description: Character length of the product description.
      - name: photos_qty
        description: Number of photos available for the product.
      - name: weight_g
        description: Weight of the product in grams.
      - name: length_cm
        description: Length of the product in centimeters.
      - name: height_cm
        description: Height of the product in centimeters.
      - name: width_cm
        description: Width of the product in centimeters.

  - name: slv_stg_olist__sellers
    description: Cleaned and standardized sellers.
    columns:
      - name: seller_id
        description: "{{ doc('seller_id') }}"
      - name: zip_code_prefix
        description: "{{ doc('zip_code_prefix') }}"
      - name: city
        description: "{{ doc('city_name') }}"
      - name: state_id
        description: "{{ doc('state_abbreviation') }}"

  - name: slv_stg_ibge__airports
    description: Cleaned and standardized IBGE airport data.
    columns:
      - name: state_id
        description: "{{ doc('state_abbreviation') }}"
      - name: passengers_rate
        description: Normalized rate of airport passengers in the state.

  - name: slv_stg_ibge__human_development_index
    description: Cleaned and standardized IBGE Human Development Index data.
    tests:
      - test_mean_consistency:
          arguments:
            hdi: hdi_2017
            hdi_education: hdi_education_2017
            hdi_wealth: hdi_wealth_2017
            hdi_health: hdi_health_2017
            tolerance: 0.1
      - test_mean_consistency:
          arguments:
            hdi: hdi_2010
            hdi_education: hdi_education_2010
            hdi_wealth: hdi_wealth_2010
            hdi_health: hdi_health_2010
            tolerance: 0.1
      - test_mean_consistency:
          arguments:
            hdi: hdi_2000
            hdi_education: hdi_education_2000
            hdi_wealth: hdi_wealth_2000
            hdi_health: hdi_health_2000
            tolerance: 0.1
      - test_mean_consistency:
          arguments:
            hdi: hdi_1991
            hdi_education: hdi_education_1991
            hdi_wealth: hdi_wealth_1991
            hdi_health: hdi_health_1991
            tolerance: 0.1
    columns:
      - name: state_id
        description: "{{ doc('state_abbreviation') }}"
      - name: hdi_2017
        description: Overall HDI for the state in 2017.
      - name: hdi_education_2017
        description: Education component of the HDI for the state in 2017.
      - name: hdi_wealth_2017
        description: Wealth component of the HDI for the state in 2017.
      - name: hdi_health_2017
        description: Health component of the HDI for the state in 2017.
      - name: hdi_2010
        description: Overall HDI for the state in 2010.
      - name: hdi_education_2010
        description: Education component of the HDI for the state in 2010.
      - name: hdi_wealth_2010
        description: Wealth component of the HDI for the state in 2010.
      - name: hdi_health_2010
        description: Health component of the HDI for the state in 2010.
      - name: hdi_2000
        description: Overall HDI for the state in 2000.
      - name: hdi_education_2000
        description: Education component of the HDI for the state in 2000.
      - name: hdi_wealth_2000
        description: Wealth component of the HDI for the state in 2000.
      - name: hdi_health_2000
        description: Health component of the HDI for the state in 2000.
      - name: hdi_1991
        description: Overall HDI for the state in 1991.
      - name: hdi_education_1991
        description: Education component of the HDI for the state in 1991.
      - name: hdi_wealth_1991
        description: Wealth component of the HDI for the state in 1991.
      - name: hdi_health_1991
        description: Health component of the HDI for the state in 1991.

  - name: slv_stg_ibge__intensive_care_unit_beds
    description: Cleaned and standardized IBGE ICU bed data.
    tests:
      - test_ratio_consistency:
          description: Validates public_beds_per_10k_citizens against total public beds and state population.
          arguments:
            numerator: public_beds
            denominator: population
            given_ratio: public_beds_per_10k_citizens
            scale: 10000
            join_to: slv_stg_ibge__states
            join_on: state_id
      - test_ratio_consistency:
          description: Validates private_beds_per_10k_citizens against total private beds and state population.
          arguments:
            numerator: private_beds
            denominator: population
            given_ratio: private_beds_per_10k_citizens
            scale: 10000
            join_to: slv_stg_ibge__states
            join_on: state_id
    columns:
      - name: state_id
        description: "{{ doc('state_abbreviation') }}"
      - name: icu_beds
        description: Total number of ICU beds in the state.
      - name: public_beds
        description: Number of public ICU beds in the state.
      - name: private_beds
        description: Number of private ICU beds in the state.
      - name: public_beds_per_10k_citizens
        description: Public ICU beds per 10,000 citizens in the state.
      - name: private_beds_per_10k_citizens
        description: Private ICU beds per 10,000 citizens in the state.

  - name: slv_stg_ibge__states
    description: Cleaned and standardized IBGE state data.
    tests:
      - test_ratio_consistency:
          description: Validates demographic_density_per_km2 against state population and area.
          arguments:
            numerator: population
            denominator: area_km2
            given_ratio: demographic_density_per_km2
    columns:
      - name: state_id
        description: "{{ doc('state_abbreviation') }}"
      - name: state_name
        description: Full name of the state.
      - name: capital
        description: Capital city of the state.
      - name: region
        description: Region of Brazil the state belongs to (e.g. North, Northeast, Southeast, South, Central-West).
      - name: area_km2
        description: Total area of the state in square kilometers.
      - name: population
        description: Total population of the state.
      - name: demographic_density_per_km2
        description: Population per square kilometer in the state.
      - name: cities_number
        description: Number of cities in the state.
      - name: gdp
        description: Gross Domestic Product of the state.
      - name: gdp_world_share
        description: Share of the state's GDP in Brazil's total GDP.
      - name: poverty_index
        description: Share of the state's population living below the poverty line.
      - name: latitude
        description: Latitude coordinate of the state.
      - name: longitude
        description: Longitude coordinate of the state.
