sources:
  - name: ibge
    description: >
      The Brazilian Institute of Geography and Statistics (IBGE) is the main
      provider of statistics in Brazil. The dataset covers state-level
      demographic, socioeconomic, and healthcare indicators.
    meta:
      source_url: "https://www.kaggle.com/datasets/thiagobodruk/brazilianstates"
    database: "{{ 'prod' if target.name == 'dev' else target.database }}"
    schema: raw_ibge
    tables:
      - name: airports
        description: Airport passenger activity by state.
        columns:
          - name: UF
            description: "{{ doc('state_abbreviation') }}"
            tests:
              - unique
              - not_null
          - name: "Passengers rate"
            quote: true  # DuckDB requires quoting for column names containing spaces.
            description: Normalized rate of airport passengers in the state.
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  arguments:
                    min_value: 0
                    max_value: 1
                    inclusive: true

      - name: hdi
        description: Human Development Index by state, across multiple census years.
        columns:
          - name: UF
            description: "{{ doc('state_abbreviation') }}"
            tests:
              - unique
              - not_null
          - name: "HDI 2017"
            quote: true  # DuckDB requires quoting for column names containing spaces.
            description: Overall Human Development Index for the state in 2017.
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  arguments:
                    min_value: 0
                    max_value: 1
                    inclusive: true
          - name: "HDI Education 2017"
            quote: true  # DuckDB requires quoting for column names containing spaces.
            description: Education component of the HDI for the state in 2017.
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  arguments:
                    min_value: 0
                    max_value: 1
                    inclusive: true
          - name: "HDI Wealth 2017"
            quote: true  # DuckDB requires quoting for column names containing spaces.
            description: Wealth component of the HDI for the state in 2017.
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  arguments:
                    min_value: 0
                    max_value: 1
                    inclusive: true
          - name: "HDI Health 2017"
            quote: true  # DuckDB requires quoting for column names containing spaces.
            description: Health component of the HDI for the state in 2017.
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  arguments:
                    min_value: 0
                    max_value: 1
                    inclusive: true
          - name: "HDI 2010"
            quote: true  # DuckDB requires quoting for column names containing spaces.
            description: Overall Human Development Index for the state in 2010.
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  arguments:
                    min_value: 0
                    max_value: 1
                    inclusive: true
          - name: "HDI Education 2010"
            quote: true  # DuckDB requires quoting for column names containing spaces.
            description: Education component of the HDI for the state in 2010.
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  arguments:
                    min_value: 0
                    max_value: 1
                    inclusive: true
          - name: "HDI Wealth 2010"
            quote: true  # DuckDB requires quoting for column names containing spaces.
            description: Wealth component of the HDI for the state in 2010.
            tests:
