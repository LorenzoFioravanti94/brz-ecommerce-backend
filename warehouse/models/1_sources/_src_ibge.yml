      - name: icu_beds
        description: Intensive care unit (ICU) bed capacity by state.
        columns:
          - name: UF
            description: "{{ doc('state_abbreviation') }}"
            tests:
              - unique
              - not_null
          - name: "ICU beds"
            quote: true  # DuckDB requires quoting for column names containing spaces.
            description: Total number of ICU beds in the state.
          - name: "Public beds"
            quote: true  # DuckDB requires quoting for column names containing spaces.
            description: Number of public ICU beds in the state.
          - name: "Private beds"
            quote: true  # DuckDB requires quoting for column names containing spaces.
            description: Number of private ICU beds in the state.
          - name: "Public beds per citizen"
            quote: true  # DuckDB requires quoting for column names containing spaces.
            description: Public ICU beds per citizen in the state.
          - name: "Private beds per citizen"
            quote: true  # DuckDB requires quoting for column names containing spaces.
            description: Private ICU beds per citizen in the state.

      - name: states
        description: Reference attributes for Brazilian states.
        columns:
          - name: UF
            description: "{{ doc('state_abbreviation') }}"
            tests:
              - unique
              - not_null
          - name: State
            description: Full name of the state.
            tests:
              - not_null
          - name: Capital
            description: Capital city of the state.
            tests:
              - not_null
          - name: Region
            description: Region of Brazil the state belongs to (e.g. North, Northeast, Southeast, South, Central-West).
            tests:
              - not_null
          - name: Area
            description: Total area of the state in square kilometers.
          - name: Population
            description: Total population of the state.
          - name: "Demographic Density"
            quote: true  # DuckDB requires quoting for column names containing spaces.
            description: Population per square kilometer in the state.
          - name: "Cities count"
            quote: true  # DuckDB requires quoting for column names containing spaces.
            description: Number of cities in the state.
            tests:
              - not_null
          - name: GDP
            description: Gross Domestic Product of the state, in Brazilian Reais.
          - name: "GDP rate"
            quote: true  # DuckDB requires quoting for column names containing spaces.
            description: GDP growth rate of the state.
          - name: Poverty
            description: Poverty rate in the state.
          - name: Latitude
            description: Latitude coordinate of the state.
            tests:
              - not_null
          - name: Longitude
            description: Longitude coordinate of the state.
            tests:
              - not_null
