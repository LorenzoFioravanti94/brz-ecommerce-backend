on:
  push:
    branches: [main]    # triggers on every merge to main

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    name: Update dbt manifest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: pip install dbt-duckdb

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          brz_ecommerce_backend:
            target: prod
            outputs:
              prod:
                type: duckdb
                path: /tmp/prod.duckdb
                threads: 4
          EOF

      - name: Generate manifest
        run: dbt parse --project-dir brz_ecommerce_backend

      - name: Save manifest as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbt-manifest
          path: brz_ecommerce_backend/target/manifest.json
          retention-days: 400    # maximum retention period — artifact expires after 400 days