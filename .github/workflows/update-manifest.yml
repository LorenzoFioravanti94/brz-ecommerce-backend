```yaml
name: update-manifest

on:
  workflow_run:
    workflows: ["dagster-cd"]
    types:
      - completed

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    name: Update persistent dbt manifest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: pip install dbt-duckdb==1.10.1

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          brz_ecommerce_backend:
            target: prod
            outputs:
              prod:
                type: duckdb
                path: /tmp/prod.duckdb
                threads: 4
          EOF

      - name: Generate production manifest
        run: |
          dbt parse \
            --target prod \
            --project-dir brz_ecommerce_backend

      - name: Update persistent manifest
        run: |
          mkdir -p brz_ecommerce_backend/persistent_state
          cp brz_ecommerce_backend/target/manifest.json \
             brz_ecommerce_backend/persistent_state/manifest.json

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add brz_ecommerce_backend/persistent_state/manifest.json

          git diff --cached --quiet || git commit -m "Update production manifest"

          git push
```
