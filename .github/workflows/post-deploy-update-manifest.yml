name: post-deploy-update-manifest

on:
  workflow_run:
    workflows: ["dagster-cd"]
    types:
      - completed

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    name: Update persistent dbt manifest

    # Esegui solo se dagster-cd ha avuto successo
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write

    steps:
      # checkout esplicito di main (non del commit SHA dell'evento)
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.MANIFEST_PAT }}

      - name: Install dependencies
        # duckdb is pinned (dbt-duckdb only requires >=1.0.0): a newer duckdb
        # injects the `javascript` language into the `function` materialization,
        # producing a manifest that dbt-core 1.11.8 cannot read back as state.
        # This must match the version used by Slim CI and prod for round-tripping.
        run: pip install dbt-core==1.11.8 dbt-duckdb==1.10.1 duckdb==1.0.0

      - name: Install dbt packages
        run: dbt deps --project-dir brz_ecommerce_backend

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          brz_ecommerce_backend:
            target: prod
            outputs:
              prod:
                type: duckdb
                # dbt parse non ha bisogno del db fisico,
                # ma il path deve essere valido sintatticamente
                path: /tmp/prod.duckdb
                threads: 4
          EOF

      - name: Generate manifest from main (dbt parse — no DB needed)
        run: |
          dbt parse \
            --target prod \
            --project-dir brz_ecommerce_backend

      - name: Update persistent_state
        run: |
          mkdir -p ${{ github.workspace }}/persistent_state
          cp brz_ecommerce_backend/target/manifest.json \
             ${{ github.workspace }}/persistent_state/manifest.json

      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add ${{ github.workspace }}/persistent_state/manifest.json

          if git diff --cached --quiet; then
            echo "No changes to manifest — skipping commit"
          else
            git commit -m "chore(ci): update persistent_state manifest"
            # Rebase onto any commits that landed on main since checkout,
            # otherwise a concurrent push leaves the manifest stale with no retry.
            git pull --rebase origin main
            git push origin main
          fi