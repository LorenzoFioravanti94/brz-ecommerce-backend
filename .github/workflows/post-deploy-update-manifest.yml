name: post-deploy-update-manifest

on:
  workflow_run:
    workflows: ["dagster-cd"]
    types:
      - completed

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    name: Update persistent dbt manifest

    # Run only if dagster-cd succeeded.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write

    steps:
      # Check out main explicitly (not the event's commit SHA).
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.MANIFEST_PAT }}

      - name: Install dependencies
        # Shared dbt pins (incl. duckdb==1.0.0) — must match Slim CI so the
        # reference manifest round-trips. See requirements-dbt.txt.
        run: pip install -r requirements-dbt.txt

      - name: Install dbt packages
        run: dbt deps --project-dir brz_ecommerce_backend

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          # This manifest is ONLY consumed as the Slim CI comparison state, and
          # Slim CI runs with --target test. The reference must therefore be
          # parsed with the SAME target/profile (identical duckdb path => same
          # database name "test"), otherwise every source's relation differs by
          # database name (prod vs test) and state:modified flags ALL sources,
          # cascading state:modified+ onto the whole DAG. Must match ci.yml.
          cat > ~/.dbt/profiles.yml << 'EOF'
          brz_ecommerce_backend:
            target: test
            outputs:
              test:
                type: duckdb
                # dbt parse needs no physical DB, but the path must be valid and
                # its stem must match ci.yml so the database name aligns.
                path: /tmp/test.duckdb
                threads: 2
          EOF

      - name: Generate manifest from main (dbt parse — no DB needed)
        run: |
          dbt parse \
            --target test \
            --project-dir brz_ecommerce_backend

      - name: Update persistent_state
        run: |
          mkdir -p ${{ github.workspace }}/persistent_state
          cp brz_ecommerce_backend/target/manifest.json \
             ${{ github.workspace }}/persistent_state/manifest.json

      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add ${{ github.workspace }}/persistent_state/manifest.json

          if git diff --cached --quiet; then
            echo "No changes to manifest — skipping commit"
          else
            git commit -m "chore(ci): update persistent_state manifest"
            # Rebase onto any commits that landed on main since checkout,
            # otherwise a concurrent push leaves the manifest stale with no retry.
            git pull --rebase origin main
            git push origin main
          fi