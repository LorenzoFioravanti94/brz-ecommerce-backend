name: dagster-cd

on:
  push:
    branches: [main]

jobs:
  trigger-dagster:
    # Skip the manifest auto-commit pushed by post-deploy-update-manifest.yml,
    # otherwise it would re-trigger this workflow in a loop.
    if: "!contains(github.event.head_commit.message, 'update persistent_state manifest')"
    runs-on: ubuntu-latest
    name: Trigger Dagster Standard Job

    steps:
      - uses: actions/checkout@v6

      - name: Reload code location and run standard_job
        # Reloads the Dagster code location so the merged dbt project is
        # re-parsed into a fresh manifest, then launches standard_job and waits
        # for it to finish. See scripts/dagster_trigger.py for the GraphQL flow.
        run: python3 scripts/dagster_trigger.py
        env:
          DAGSTER_URL: ${{ secrets.DAGSTER_URL }}
