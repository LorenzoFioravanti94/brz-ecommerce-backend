name: ci

on:
  pull_request:
    branches: [develop, main]

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: pip install dbt-duckdb==1.10.1

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          brz_ecommerce_backend:
            target: test
            outputs:
              test:
                type: duckdb
                path: /tmp/test.duckdb
                threads: 2
          EOF

      - name: Debug dbt
        run: dbt debug --project-dir brz_ecommerce_backend
        
      - name: Download manifest artifact
        uses: actions/download-artifact@v6
        with:
          name: dbt-manifest
          path: brz_ecommerce_backend/state

      - name: Fail if manifest missing
        run: |
          if [ ! -f brz_ecommerce_backend/state/manifest.json ]; then
            echo "ERROR: missing manifest artifact from base branch CI"
            exit 1
          fi
          
      - name: Run dbt (Slim CI — PR towards develop)
        if: github.base_ref == 'develop'
        run: |
          dbt build \
            --select state:modified+ \
            --defer \
            --state brz_ecommerce_backend/state \
            --target test \
            --project-dir brz_ecommerce_backend

      - name: Run dbt (Full CI — PR towards main)
        if: github.base_ref == 'main'
        run: dbt build --target test --project-dir brz_ecommerce_backend