name: ci

on:
  pull_request:
    branches: [develop, main]

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          pip install dbt-core==1.11.8 dbt-duckdb==1.10.1 kaggle

      - name: Install dbt packages
        run: dbt deps --project-dir brz_ecommerce_backend

      - name: Configure Kaggle API Token
        run: |
          mkdir -p ~/.kaggle
          echo "${{ secrets.KAGGLE_API_TOKEN }}" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token

      - name: Download datasets
        run: |
          mkdir -p data/raw/olist data/raw/ibge

          kaggle datasets download -d olistbr/brazilian-ecommerce -p data/raw/olist --unzip
          kaggle datasets download -d thiagobodruk/brazilianstates -p data/raw/ibge --unzip

      - name: Run ingestion
        run: python scripts/data_ingestion.py
        env:
          DBT_TARGET: test

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          brz_ecommerce_backend:
            target: test
            outputs:
              test:
                type: duckdb
                path: /tmp/test.duckdb
                threads: 2
          EOF

      - name: dbt debug
        run: dbt debug --project-dir brz_ecommerce_backend

      # =========================
      # SLIM CI (develop PR)
      # =========================
      - name: Slim CI
        if: github.base_ref == 'develop'
        run: |
          dbt build \
            --select state:modified+ \
            --defer \
            --state .

      # =========================
      # FULL CI (main PR)
      # =========================
      - name: Full CI
        if: github.base_ref == 'main'
        run: |
          dbt build \
            --target test

  # =========================
  # MANIFEST GENERATION (NO GIT)
  # =========================
  build-manifest:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          pip install dbt-core==1.11.8 dbt-duckdb==1.10.1

      - name: dbt deps
        run: dbt deps --project-dir brz_ecommerce_backend

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          brz_ecommerce_backend:
            target: prod
            outputs:
              prod:
                type: duckdb
                path: /tmp/prod.duckdb
                threads: 4
          EOF

      - name: Generate manifest
        run: |
          dbt parse --target prod --project-dir brz_ecommerce_backend

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbt-manifest
          path: brz_ecommerce_backend/target/manifest.json