name: ci

on:
  pull_request:
    branches: [develop, main]

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          # Pin manifest-affecting transitive deps to keep manifest hashing
          # byte-compatible with the prod manifest in persistent_state/.
          # A drift here is what silently breaks state:modified selection.
          # NOTE: duckdb is pinned because dbt-duckdb only requires duckdb>=1.0.0.
          # A newer duckdb makes the `function` materialization advertise the
          # `javascript` language, which dbt-core 1.11.8 cannot read back from
          # the comparison manifest (InvalidFieldValue) — breaking Slim CI.
          pip install \
            dbt-core==1.11.8 \
            dbt-duckdb==1.10.1 \
            duckdb==1.0.0 \
            dbt-adapters==1.22.10 \
            dbt-common==1.37.3 \
            dbt-extractor==0.6.0 \
            dbt-semantic-interfaces==0.9.0 \
            kaggle

      - name: Verify dbt version (guard against silent version skew)
        run: |
          # Fail loudly if the installed dbt-core differs from the version
          # that produced the prod manifest — never fall back to "select all".
          python -c "import dbt.version as v; assert v.__version__ == '1.11.8', f'dbt-core is {v.__version__}, expected 1.11.8'"

      - name: Install dbt packages
        run: dbt deps --project-dir brz_ecommerce_backend

      - name: Configure Kaggle API Token
        run: |
          mkdir -p ~/.kaggle
          echo "${{ secrets.KAGGLE_API_TOKEN }}" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token

      - name: Download datasets
        run: |
          mkdir -p data/raw/olist
          mkdir -p data/raw/ibge

          kaggle datasets download \
            -d olistbr/brazilian-ecommerce \
            -p data/raw/olist \
            --unzip

          kaggle datasets download \
            -d thiagobodruk/brazilianstates \
            -p data/raw/ibge \
            --unzip

      - name: Run DuckDB ingestion
        run: python scripts/data_ingestion.py
        env:
          DBT_TARGET: test

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          brz_ecommerce_backend:
            target: test
            outputs:
              test:
                type: duckdb
                path: /tmp/test.duckdb
                threads: 2
          EOF

      - name: Debug dbt
        run: dbt debug --project-dir brz_ecommerce_backend

      # ==============================
      # 🔄 FETCH PROD REFERENCE STATE
      # ==============================
      - name: Fetch prod manifest from main (Slim CI reference state)
        if: github.base_ref == 'develop'
        run: |
          # The Slim CI state must be the PROD manifest (what is already
          # deployed on main), NOT the current branch. Overwrite only this
          # single file from origin/main, leaving the PR's model code intact,
          # so state:modified compares the feature branch against production.
          git fetch origin main --depth=1
          git checkout origin/main -- persistent_state/manifest.json

      # ==============================
      # 🚀 SLIM CI RUN
      # ==============================
      - name: Run dbt (Slim CI — PR towards develop)
        if: github.base_ref == 'develop'
        run: |
          # IMPORTANT: dbt resolves --state RELATIVE TO --project-dir, not to the
          # working dir. persistent_state/ lives in the repo root (outside the dbt
          # project), so an absolute path is required — a bare "persistent_state"
          # would be looked up under brz_ecommerce_backend/ and fail with
          # "no comparison manifest".
          dbt build \
            --select state:modified+ resource_type:seed \
            --state ${{ github.workspace }}/persistent_state \
            --target test \
            --project-dir brz_ecommerce_backend

      # ==============================
      # 🚀 FULL CI
      # ==============================
      - name: Run dbt (Full CI — PR towards main)
        if: github.base_ref == 'main'
        run: |
          dbt build \
            --target test \
            --project-dir brz_ecommerce_backend