name: ci

on:
  pull_request:
    branches: [develop, main]

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pip install dbt-core==1.11.8 dbt-duckdb==1.10.1

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          brz_ecommerce_backend:
            target: test
            outputs:
              test:
                type: duckdb
                path: /tmp/test.duckdb
                threads: 2
          EOF

      - name: Debug profiles.yml
        run: |
          echo "=== contenuto profiles.yml ==="
          cat ~/.dbt/profiles.yml
          echo "=== dbt debug output ==="

      - name: Debug dbt
        run: dbt debug --project-dir brz_ecommerce_backend

      - name: Debug persistent_state
        if: github.base_ref == 'develop'
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Repo structure ==="
          ls -la
          echo "=== persistent_state contents ==="
          ls -la brz_ecommerce_backend/persistent_state/ || echo "DIRECTORY NOT FOUND"
          echo "=== manifest exists? ==="
          cat brz_ecommerce_backend/persistent_state/manifest.json | head -5 || echo "FILE NOT FOUND"

      - name: Debug paths
        if: github.base_ref == 'develop'
        run: |
          echo "=== PWD ==="
          pwd
          echo "=== stato del manifest ==="
          ls -la brz_ecommerce_backend/persistent_state/manifest.json
          echo "=== dbt_project.yml esiste? ==="
          ls -la brz_ecommerce_backend/dbt_project.yml
          echo "=== path assoluto manifest ==="
          realpath brz_ecommerce_backend/persistent_state/manifest.json

      - name: Debug manifest content
        if: github.base_ref == 'develop'
        run: |
          echo "=== dimensione file ==="
          wc -c brz_ecommerce_backend/persistent_state/manifest.json
          echo "=== è JSON valido? ==="
          python3 -c "
          import json
          with open('brz_ecommerce_backend/persistent_state/manifest.json') as f:
            d = json.load(f)
          print('dbt_version:', d['metadata']['dbt_version'])
          print('schema_version:', d['metadata']['dbt_schema_version'])
          print('nodes count:', len(d.get('nodes', {})))
          " || echo "ERRORE: JSON non valido o corrotto"

      - name: Debug state flag
        if: github.base_ref == 'develop'
        run: |
          echo "=== path passato a --state ==="
          ls -la brz_ecommerce_backend/persistent_state/
          echo "=== dbt parse genera il manifest corrente ==="
          dbt parse \
            --target test \
            --project-dir brz_ecommerce_backend
          echo "=== manifest generato da dbt parse ==="
          ls -la brz_ecommerce_backend/target/manifest.json || echo "NON TROVATO"
          echo "=== provo list con state ==="
          dbt list \
            --select "state:modified+" \
            --state brz_ecommerce_backend/persistent_state \
            --project-dir brz_ecommerce_backend

      # SLIM CI: solo PR verso develop
      - name: Check persistent_state exists (Slim CI guard)
        if: github.base_ref == 'develop'
        run: |
          if [ ! -f brz_ecommerce_backend/persistent_state/manifest.json ]; then
            echo "ERROR: persistent_state/manifest.json not found."
            echo "Run the bootstrap step on main and push it first."
            exit 1
          fi

      - name: Run dbt (Slim CI — PR towards develop)
        if: github.base_ref == 'develop'
        run: |
          dbt build \
            --select "state:modified+" \
            --defer \
            --state brz_ecommerce_backend/persistent_state \
            --target test \
            --project-dir brz_ecommerce_backend

      # FULL CI: solo PR verso main
      - name: Run dbt (Full CI — PR towards main)
        if: github.base_ref == 'main'
        run: |
          dbt build \
            --target test \
            --project-dir brz_ecommerce_backend