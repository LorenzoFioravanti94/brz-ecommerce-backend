name: ci

on:
  pull_request:
    branches: [develop, main]

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          pip install \
            dbt-core==1.11.8 \
            dbt-duckdb==1.10.1 \
            kaggle

      - name: Install dbt packages
        run: dbt deps --project-dir brz_ecommerce_backend

      - name: Configure Kaggle API Token
        run: |
          mkdir -p ~/.kaggle
          echo "${{ secrets.KAGGLE_API_TOKEN }}" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token

      - name: Download datasets
        run: |
          mkdir -p data/raw/olist
          mkdir -p data/raw/ibge

          kaggle datasets download \
            -d olistbr/brazilian-ecommerce \
            -p data/raw/olist \
            --unzip

          kaggle datasets download \
            -d thiagobodruk/brazilianstates \
            -p data/raw/ibge \
            --unzip

      - name: Run DuckDB ingestion
        run: python scripts/data_ingestion.py
        env:
          DBT_TARGET: test

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          brz_ecommerce_backend:
            target: test
            outputs:
              test:
                type: duckdb
                path: /tmp/test.duckdb
                threads: 2
          EOF

      - name: Debug dbt
        run: dbt debug --project-dir brz_ecommerce_backend

      # ==============================
      # 🔥 CLEAN SLIM CI STATE (SAFE)
      # ==============================
      - name: Build state for Slim CI (develop only)
        if: github.base_ref == 'develop'
        run: |
          mkdir -p persistent_state

          # 👉 IMPORTANT: NON mescolare repo state
          # usiamo SOLO il branch corrente (no checkout di main)

          dbt parse \
            --project-dir brz_ecommerce_backend \
            --target test

          cp brz_ecommerce_backend/target/manifest.json persistent_state/manifest.json

      # ==============================
      # 🚀 SLIM CI RUN
      # ==============================
      - name: Run dbt (Slim CI — PR towards develop)
        if: github.base_ref == 'develop'
        run: |
          dbt build \
            --select state:modified+ resource_type:seed \
            --state persistent_state \
            --target test \
            --project-dir brz_ecommerce_backend

      # ==============================
      # 🚀 FULL CI
      # ==============================
      - name: Run dbt (Full CI — PR towards main)
        if: github.base_ref == 'main'
        run: |
          dbt build \
            --target test \
            --project-dir brz_ecommerce_backend