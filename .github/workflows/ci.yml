name: ci

on:
  pull_request:
    branches: [develop, main]

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set DBT env var
        run: echo "DBT_PROD_DB_PATH=/tmp/prod.duckdb" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          pip install \
          dbt-core==1.11.8 \
          dbt-duckdb==1.10.1 \
          duckdb==1.0.0 \
          kaggle

      - name: Configure Kaggle API Token
        run: |
          mkdir -p ~/.kaggle
          echo "${{ secrets.KAGGLE_API_TOKEN }}" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token

      - name: Debug working directory
        run: |
          pwd
          ls -R

      - name: Download Olist dataset
        run: |
          mkdir -p brz_ecommerce_backend/data/raw/olist

          kaggle datasets download \
            -d olistbr/brazilian-ecommerce \
            -p brz_ecommerce_backend/data/raw/olist \
            --unzip

      - name: Debug Olist download
        run: |
          ls -R brz_ecommerce_backend/data/raw/olist

      - name: Download Brazil states dataset
        run: |
          mkdir -p brz_ecommerce_backend/data/raw/ibge

          kaggle datasets download \
            -d thiagobodruk/brazilianstates \
            -p brz_ecommerce_backend/data/raw/ibge \
            --unzip
      
      - name: Debug Brazil states download
        run: |
          ls -R brz_ecommerce_backend/data/raw/ibge

      - name: Debug ingestion input
        run: |
          ls -R data/raw || true
          ls -R brz_ecommerce_backend/data/raw || true

      - name: Run DuckDB ingestion
        run: |
          python scripts/data_ingestion.py

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          brz_ecommerce_backend:
            target: test
            outputs:
              test:
                type: duckdb
                path: /tmp/test.duckdb
                threads: 2
          EOF

      - name: Debug dbt
        run: dbt debug --project-dir brz_ecommerce_backend

      - name: Check persistent_state exists (Slim CI guard)
        if: github.base_ref == 'develop'
        run: |
          if [ ! -f brz_ecommerce_backend/persistent_state/manifest.json ]; then
            echo "ERROR: persistent_state/manifest.json not found."
            echo "Run the bootstrap step on main and push it first."
            exit 1
          fi

      - name: Run dbt (Slim CI — PR towards develop)
        if: github.base_ref == 'develop'
        run: |
          dbt build \
            --select "state:modified+" \
            --defer \
            --state persistent_state \
            --target test \
            --project-dir brz_ecommerce_backend

      - name: Run dbt (Full CI — PR towards main)
        if: github.base_ref == 'main'
        run: |
          dbt build \
            --target test \
            --project-dir brz_ecommerce_backend