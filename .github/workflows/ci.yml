on:
  pull_request:
    branches: [develop, main]

jobs:
  dbt-ci:
    runs-on: ubuntu-latest
    name: Run dbt build

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: pip install dbt-duckdb

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          brz_ecommerce_backend:
            target: test
            outputs:
              test:
                type: duckdb
                path: /tmp/test.duckdb
                threads: 2
          EOF

      - name: Download manifest artifact
        uses: actions/download-artifact@v4
        with:
          name: dbt-manifest
          path: brz_ecommerce_backend/state
        continue-on-error: true    # if no artifact exists yet, falls back to committed manifest

      - name: Run dbt
        run: dbt build --target test --project-dir brz_ecommerce_backend