name: ci

on:
  pull_request:
    branches: [develop, main]

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    steps:
      # Default fetch-depth (1) is enough: no step reads git history, and the
      # prod manifest is fetched explicitly from origin/main further below.
      - uses: actions/checkout@v6

      - name: Install dependencies
        # dbt pins live in requirements-dbt.txt (shared with post-deploy) to
        # keep the manifest byte-compatible with the prod comparison state.
        # kaggle is CI-only (raw data ingestion) and installed alongside.
        run: pip install -r requirements-dbt.txt kaggle

      - name: Verify dbt version (guard against silent version skew)
        run: |
          # Fail loudly if the installed dbt-core differs from the version
          # that produced the prod manifest — never fall back to "select all".
          python -c "import dbt.version as v; assert v.__version__ == '1.11.8', f'dbt-core is {v.__version__}, expected 1.11.8'"

      - name: Install dbt packages
        run: dbt deps --project-dir brz_ecommerce_backend

      - name: Configure Kaggle API Token
        run: |
          mkdir -p ~/.kaggle
          echo "${{ secrets.KAGGLE_API_TOKEN }}" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token

      - name: Download datasets
        # `kaggle ... -p <dir>` creates the target directory itself.
        run: |
          kaggle datasets download \
            -d olistbr/brazilian-ecommerce \
            -p data/raw/olist \
            --unzip

          kaggle datasets download \
            -d thiagobodruk/brazilianstates \
            -p data/raw/ibge \
            --unzip

      - name: Run DuckDB ingestion
        run: python scripts/data_ingestion.py
        env:
          DBT_TARGET: test

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          brz_ecommerce_backend:
            target: test
            outputs:
              test:
                type: duckdb
                path: /tmp/test.duckdb
                threads: 2
          EOF

      # ==============================
      # 🔄 FETCH PROD REFERENCE STATE
      # ==============================
      - name: Fetch prod manifest from main (Slim CI reference state)
        if: github.base_ref == 'develop'
        run: |
          # The Slim CI state must be the PROD manifest (what is already
          # deployed on main), NOT the current branch. Overwrite only this
          # single file from origin/main, leaving the PR's model code intact,
          # so state:modified compares the feature branch against production.
          git fetch origin main --depth=1
          git checkout origin/main -- persistent_state/manifest.json

      # ==============================
      # 🚀 SLIM CI RUN
      # ==============================
      - name: Run dbt (Slim CI — PR towards develop)
        if: github.base_ref == 'develop'
        run: |
          # Slim CI without --defer (no prod DB is reachable from CI), so the
          # fresh DB must contain everything the selected nodes touch:
          #   • LEADING + on state:modified -> build the ANCESTORS of changed
          #     nodes, so modified models (e.g. facts that read silver) and the
          #     models behind modified tests can actually be built here.
          #   • NO trailing + -> do not graph-select downstream tests that would
          #     reference unbuilt star-schema dimensions (facts FK every dim, and
          #     dims are not ancestors of facts, so they would never be built).
          #   • --indirect-selection cautious -> attach a test only when ALL the
          #     models it references are in the build set; cross-dimension FK
          #     tests are skipped here and covered by Full CI on develop -> main.
          #   • tag:always_build -> force standalone models like dim_date.
          # IMPORTANT: --state is resolved RELATIVE TO --project-dir, so the
          # repo-root persistent_state/ needs an ABSOLUTE path here.
          dbt build \
            --select +state:modified tag:always_build resource_type:seed \
            --indirect-selection cautious \
            --state ${{ github.workspace }}/persistent_state \
            --target test \
            --project-dir brz_ecommerce_backend

      # ==============================
      # 🚀 FULL CI
      # ==============================
      - name: Run dbt (Full CI — PR towards main)
        if: github.base_ref == 'main'
        run: |
          dbt build \
            --target test \
            --project-dir brz_ecommerce_backend