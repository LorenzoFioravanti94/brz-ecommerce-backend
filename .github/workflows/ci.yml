name: ci

on:
  pull_request:
    branches: [develop, main]

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          pip install dbt-core==1.11.8 dbt-duckdb==1.10.1 kaggle

      - name: Install dbt packages
        run: dbt deps --project-dir brz_ecommerce_backend

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          brz_ecommerce_backend:
            target: test
            outputs:
              test:
                type: duckdb
                path: /tmp/test.duckdb
                threads: 2
          EOF

      - name: dbt debug
        run: dbt debug --project-dir brz_ecommerce_backend

      # =========================
      # SLIM CI (develop PR)
      # =========================
      - name: Slim CI
        if: github.base_ref == 'develop'
        run: |
          git fetch origin develop

          dbt build \
            --select state:modified+ \
            --defer \
            --state . \
            --target test \
            --project-dir brz_ecommerce_backend

      # =========================
      # FULL CI (main PR)
      # =========================
      - name: Full CI
        if: github.base_ref == 'main'
        run: |
          dbt build \
            --target test \
            --project-dir brz_ecommerce_backend