models:
  - name: slv_int_ibge__human_development_index
    description: Analysis-ready Human Development Index, cleaned and reshaped from staging.
    columns:
      - name: hdi_id
        description: Surrogate key built from state_id and year.
        tests:
          - unique
          - not_null
      - name: state_id
        description: "{{ doc('state_abbreviation') }}"
      - name: education_index
        description: Education component of the HDI for the state.
      - name: wealth_index
        description: Wealth component of the HDI for the state.
      - name: health_index
        description: Health component of the HDI for the state.
      - name: year
        description: Census year of the HDI measurement.

  - name: slv_int_ibge__intensive_care_unit_beds
    description: Analysis-ready ICU bed capacity per state, cleaned from staging.
    columns:
      - name: state_id
        description: "{{ doc('state_abbreviation') }}"
        tests:
          - unique
          - not_null
      - name: public_beds
        description: Public ICU beds per 10,000 citizens in the state.
      - name: private_beds
        description: Private ICU beds per 10,000 citizens in the state.

  - name: slv_int_ibge__states
    description: Analysis-ready Brazilian state attributes, cleaned from staging.
    columns:
      - name: state_id
        description: "{{ doc('state_abbreviation') }}"
        tests:
          - unique
          - not_null
      - name: state_name
        description: Full name of the state.
      - name: capital
        description: Capital city of the state.
      - name: region
        description: Region of Brazil the state belongs to (e.g. North, Northeast, Central-West, Southeast, South).
      - name: area_km2
        description: Total area of the state in square kilometers.
      - name: population
        description: Total population of the state.
      - name: cities_number
        description: Number of cities in the state.
      - name: gdp
        description: Gross Domestic Product of the state.
      - name: gdp_world_share
        description: Share of the state's GDP in Brazil's total GDP.
      - name: poverty_index
        description: Share of the state's population living below the poverty line.
      - name: latitude
        description: Latitude coordinate of the state.
      - name: longitude
        description: Longitude coordinate of the state.

  - name: slv_int_olist__customers
    description: Analysis-ready customers with order counts, cleaned from staging.
    columns:
      - name: customer_id
        description: "{{ doc('customer_unique_id') }}"
        tests:
          - unique
          - not_null
      - name: zip_code_prefix
        description: "{{ doc('zip_code_prefix') }}"
      - name: city
        description: "{{ doc('city_name') }}"
      - name: state_id
        description: "{{ doc('state_abbreviation') }}"
      - name: total_orders
        description: Total number of orders placed by the customer.

  - name: slv_int_olist__orders
    description: Analysis-ready orders, cleaned from staging.
    columns:
      - name: order_id
        description: "{{ doc('order_id') }}"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "{{ doc('customer_unique_id') }}"
        tests:
          - relationships:
              arguments:
                to: ref('slv_int_olist__customers')
                field: customer_id
      - name: status
        description: Current status of the order in the fulfillment process.
      - name: purchase_timestamp
        description: Timestamp the order was placed.
      - name: approved_at
        description: Timestamp the order was approved.
      - name: delivered_carrier_date
        description: Date the order was handed to the carrier.
      - name: delivered_customer_date
        description: Date the order was delivered to the customer.
      - name: estimated_delivery_date
        description: Estimated delivery date for the order.

  - name: slv_int_olist__product_category
    description: Analysis-ready product categories with business areas, cleaned from staging.
    columns:
      - name: local_name
        description: Product category name in Portuguese.
        tests:
          - unique
          - not_null
      - name: english_name
        description: Product category name in English.
        tests:
          - not_null
      - name: business_area
        description: Business area the product category belongs to.

  - name: slv_int_olist__geolocation
    description: Analysis-ready geolocation with corrected city names and averaged coordinates.
    columns:
      - name: zip_code_prefix
        description: "{{ doc('zip_code_prefix') }}"
        tests:
          - unique
          - not_null
      - name: latitude_mean
        description: Average latitude coordinate for the zip code prefix.
      - name: longitude_mean
        description: Average longitude coordinate for the zip code prefix.
      - name: city
        description: "{{ doc('city_name') }}"
      - name: state_id
        description: "{{ doc('state_abbreviation') }}"

  - name: slv_int_olist__order_items
    description: Analysis-ready order items, cleaned from staging.
    columns:
      - name: order_item_id
        description: Surrogate key for the order item.
        tests:
          - unique
          - not_null
      - name: order_id
        description: "{{ doc('order_id') }}"
      - name: item_sequence_number
        description: Sequence number of the item within the order.
      - name: product_id
        description: "{{ doc('product_id') }}"
      - name: seller_id
        description: "{{ doc('seller_id') }}"
      - name: shipping_limit_date
        description: Deadline for the seller to ship the item.
      - name: price
        description: Price of the item.
      - name: freight_value
        description: Freight cost charged for the item.

  - name: slv_int_olist__order_payments
    description: Analysis-ready order payments, cleaned from staging.
    columns:
      - name: order_payment_id
        description: Surrogate key for the order payment.
        tests:
          - unique
          - not_null
      - name: order_id
        description: "{{ doc('order_id') }}"
      - name: sequence_number
        description: Sequence number of the payment within the order.
      - name: type
        description: Payment method used for the order.
        tests:
          - accepted_values:
              arguments:
                values:
                  - credit_card
                  - boleto
                  - voucher
                  - debit_card
                  - not_defined
      - name: installments_count
        description: Number of installments for the payment.
      - name: value
        description: Total value of the payment.

  - name: slv_int_olist__order_reviews
    description: Analysis-ready order reviews, deduplicated to a stable per-order grain.
    columns:
      - name: order_review_id
        description: Identifies each review at the order grain; one customer review can span multiple orders in the same transaction.
        tests:
          - unique
          - not_null
      - name: review_group_id
        description: Groups the orders that shared the same customer review.
      - name: order_id
        description: "{{ doc('order_id') }}"
      - name: score
        description: Score given by the customer, from 1 to 5.
      - name: comment_title
        description: Title of the customer's review comment.
      - name: comment_text
        description: Body of the customer's review comment.
      - name: creation_date
        description: Date the review was created.
      - name: review_answer_timestamp
        description: Timestamp the review was answered.

  - name: slv_int_olist__sellers
    description: Analysis-ready sellers, cleaned from staging.
    columns:
      - name: seller_id
        description: "{{ doc('seller_id') }}"
        tests:
          - unique
          - not_null
      - name: zip_code_prefix
        description: "{{ doc('zip_code_prefix') }}"
      - name: city
        description: "{{ doc('city_name') }}"
      - name: state_id
        description: "{{ doc('state_abbreviation') }}"
