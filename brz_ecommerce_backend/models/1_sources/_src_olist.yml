sources:
  - name: olist
    description: >
      Olist is a Brazilian e-commerce company providing a marketplace for small
      and medium-sized businesses to sell online. The dataset covers customers,
      orders, products, payments, and reviews.
    meta:
      source_url: "https://www.kaggle.com/datasets/olistbr/brazilian-ecommerce"
    database: "{{ 'prod' if target.name == 'dev' else target.database }}"
    schema: raw_olist
    tables:
      - name: category_translation
        description: Mapping of product category names from Portuguese to English.
        columns:
          - name: product_category_name
            description: Original category name in Portuguese.
          - name: product_category_name_english
            description: Translated category name in English.

      - name: customers
        description: Customer records, including identifiers and location.
        columns:
          - name: customer_id
            description: "{{ doc('customer_record_id') }}"
            tests:
              - unique
              - not_null
          - name: customer_unique_id
            description: "{{ doc('customer_unique_id') }}"
            tests:
              - not_null
          - name: customer_zip_code_prefix
            description: "{{ doc('zip_code_prefix') }}"
          - name: customer_city
            description: "{{ doc('city_name') }}"
          - name: customer_state
            description: "{{ doc('state_abbreviation') }}"

      - name: geolocation
        description: Geolocation reference mapping zip code prefixes to coordinates and place names.
        columns:
          - name: geolocation_zip_code_prefix
            description: "{{ doc('zip_code_prefix') }}"
            tests:
              - not_null
          - name: geolocation_lat
            description: Latitude coordinate.
          - name: geolocation_lng
            description: Longitude coordinate.
          - name: geolocation_city
            description: "{{ doc('city_name') }}"
          - name: geolocation_state
            description: "{{ doc('state_abbreviation') }}"

      - name: order_items
        description: Items belonging to each order, with product, seller, price, and freight.
        freshness: null  # No timestamp field available for a freshness check.
        columns:
          - name: order_id
            description: "{{ doc('order_id') }}"
            tests:
              - not_null
          - name: order_item_id
            description: Sequence number of the item within the order.
            tests:
              - not_null
          - name: product_id
            description: "{{ doc('product_id') }}"
          - name: seller_id
            description: "{{ doc('seller_id') }}"
          - name: shipping_limit_date
            description: Deadline for the seller to ship the item.
          - name: price
            description: Price of the item.
          - name: freight_value
            description: Freight cost charged for the item.

      - name: order_payments
        description: Payment transactions for each order.
        freshness: null  # No timestamp field available for a freshness check.
        columns:
          - name: order_id
            description: "{{ doc('order_id') }}"
            tests:
              - not_null
          - name: payment_sequential
            description: Sequence number of the payment within the order.
          - name: payment_type
            description: Payment method used (e.g. credit card or boleto).
          - name: payment_installments
            description: Number of installments for the payment.
          - name: payment_value
            description: Total value of the payment.

      - name: order_reviews
        description: Customer reviews submitted for orders.
        config:
          freshness:
            warn_after:
              count: 24
              period: hour
            error_after:
              count: 2
              period: day
          loaded_at_field: review_creation_date
        columns:
          - name: review_id
            description: Identifier of a review.
            tests:
              - not_null
          - name: order_id
            description: "{{ doc('order_id') }}"
          - name: review_score
            description: Score given by the customer, from 1 to 5.
            tests:
              - accepted_values:
                  arguments:
                    values:
                      - 1
                      - 2
                      - 3
                      - 4
                      - 5
          - name: review_comment_title
            description: Title of the customer's review comment.
          - name: review_comment_message
            description: Body of the customer's review comment.
          - name: review_creation_date
            description: Date the review was created.
          - name: review_answer_timestamp
            description: Timestamp the review was answered, if any.

      - name: orders
        description: Customer orders, with status and lifecycle timestamps.
        config:
          freshness:
            warn_after:
              count: 24
              period: hour
            error_after:
              count: 2
              period: day
          loaded_at_field: order_purchase_timestamp
        columns:
          - name: order_id
            description: "{{ doc('order_id') }}"
            tests:
              - unique
              - not_null
          - name: customer_id
            description: "{{ doc('customer_record_id') }}"
          - name: order_status
            description: Current status of the order in the fulfillment process.
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values:
                      - delivered
                      - shipped
                      - canceled
                      - unavailable
                      - invoiced
                      - processing
                      - created
                      - approved
          - name: order_purchase_timestamp
            description: Timestamp the order was placed.
          - name: order_approved_at
            description: Timestamp the order was approved.
          - name: order_delivered_carrier_date
            description: Timestamp the order was handed to the carrier.
          - name: order_delivered_customer_date
            description: Timestamp the order was delivered to the customer.
          - name: order_estimated_delivery_date
            description: Estimated delivery date for the order.

      - name: products
        description: Product catalog, with category and physical attributes.
        columns:
          - name: product_id
            description: "{{ doc('product_id') }}"
            tests:
              - unique
              - not_null
          - name: product_category_name
            description: Category name of the product, in Portuguese.
          - name: product_name_lenght
            description: Character length of the product name.
          - name: product_description_lenght
            description: Character length of the product description.
          - name: product_photos_qty
            description: Number of photos available for the product.
          - name: product_weight_g
            description: Weight of the product in grams.
          - name: product_length_cm
            description: Length of the product in centimeters.
          - name: product_height_cm
            description: Height of the product in centimeters.
          - name: product_width_cm
            description: Width of the product in centimeters.

      - name: sellers
        description: Seller records, including identifiers and location.
        columns:
          - name: seller_id
            description: "{{ doc('seller_id') }}"
            tests:
              - unique
              - not_null
          - name: seller_zip_code_prefix
            description: "{{ doc('zip_code_prefix') }}"
          - name: seller_city
            description: "{{ doc('city_name') }}"
          - name: seller_state
            description: "{{ doc('state_abbreviation') }}"
