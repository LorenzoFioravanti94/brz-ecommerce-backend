version: 2

sources:
  - name: olist
    description: "Olist is a Brazilian e-commerce company that provides a platform for small and medium-sized businesses to sell their products online. The dataset includes information about customers, orders, products, and reviews."
    meta:
      source_url: "https://www.kaggle.com/datasets/olistbr/brazilian-ecommerce"
    database: "{{ target.database}}"                      #"{{ 'prod' if target.name == 'dev' else target.database }}"
    schema: raw_olist
    tables:
      - name: category_translation
        description: "Translation of product category names from Portuguese to English."
        columns:
          - name: product_category_name
            description: "Original category name in Portuguese."
          - name: product_category_name_english
            description: "Translated category name in English."
      - name: customers
        description: "Customer information including customer ID, zip code, city, and state."
        columns:
          - name: customer_id
            description: "Technical identifier for a customer record. May not be stable across multiple customer accounts."
            tests:
              - unique
              - not_null
          - name: customer_unique_id
            description: "Stable business identifier representing the unique customer."
            tests:
              - not_null
          - name: customer_zip_code_prefix
            description: "Zip code prefix of the customer's location."
          - name: customer_city
            description: "City where the customer is located."
          - name: customer_state
            description: "State where the customer is located."

      - name: geolocation
        description: "Geolocation information including zip code prefix, latitude, longitude, city, and state."
        columns:
          - name: geolocation_zip_code_prefix
            description: "Zip code prefix for geolocation data."
            tests:
              - not_null
          - name: geolocation_lat
            description: "Latitude coordinate for the geolocation."
          - name: geolocation_lng
            description: "Longitude coordinate for the geolocation."
          - name: geolocation_city
            description: "City associated with the geolocation."
          - name: geolocation_state
            description: "State associated with the geolocation."

      - name: order_items
        description: "Information about items in each order, including order ID, product ID, seller ID, price, and freight value."
        freshness: null # No timestamp field available for freshness configuration in this table
        columns:
          - name: order_id
            description: "Identifier for the order to which the item belongs."
            tests:
              - not_null
          - name: order_item_id
            description: "Identifier for the specific item within the order."
            tests:
              - not_null
          - name: product_id
            description: "Identifier for the product being ordered."
          - name: seller_id
            description: "Identifier for the seller providing the product."
          - name: shipping_limit_date
            description: "Deadline for shipping the item."
          - name: price
            description: "Price of the item."
          - name: freight_value
            description: "Freight cost associated with shipping the item."
      
      - name: order_payments
        description: "Payment information for each order, including order ID, payment type, payment value, and number of installments."
        freshness: null # No timestamp field available for freshness configuration in this table
        columns:
          - name: order_id
            description: "Identifier for the order associated with the payment."
            tests:
              - not_null
          - name: payment_sequential
            description: "Sequential number indicating the order of payments for the same order."
          - name: payment_type
            description: "Type of payment used (e.g., credit card, boleto)."
          - name: payment_installments
            description: "Number of installments for the payment."
          - name: payment_value
            description: "Total value of the payment."
    
      - name: order_reviews
        description: "Customer reviews for orders, including review ID, order ID, review score, and review comment."
        config:
          freshness:
            warn_after:
              count: 24
              period: hour
            error_after:
              count: 2
              period: day
          loaded_at_field: review_creation_date
        columns:
          - name: review_id
            description: "Identifier for the review."
            tests:
              - not_null
          - name: order_id
            description: "Identifier for the order being reviewed."
          - name: review_score
            description: "Score given by the customer in the review (1 to 5)."
            tests:
              - accepted_values:
                  values:
                    - 1
                    - 2
                    - 3
                    - 4
                    - 5
          - name: review_comment_title
            description: "Title of the customer's review comment."
          - name: review_comment_message
            description: "Message content of the customer's review comment."
          - name: review_creation_date
            description: "Date when the review was created."
          - name: review_answer_timestamp
            description: "Timestamp when the seller responded to the review (if applicable)."

      - name: orders
        description: "Information about customer orders, including order ID, customer ID, order status, and order purchase timestamp."
        config:
          freshness:
            warn_after:
              count: 24
              period: hour
            error_after:
              count: 2
              period: day
          loaded_at_field: order_purchase_timestamp
        columns:
          - name: order_id
            description: "Identifier for the order."
            tests:
              - unique
              - not_null
          - name: customer_id
            description: "Identifier for the customer who placed the order."
          - name: order_status
            description: "Current status of the order (e.g., delivered, shipped)."
            tests:
              - not_null
              - accepted_values:
                  values:
                    - delivered
                    - shipped
                    - canceled
                    - unavailable
                    - invoiced
                    - processing
                    - created
                    - approved
          - name: order_purchase_timestamp
            description: "Timestamp when the order was placed."
          - name: order_approved_at
            description: "Timestamp when the order was approved."
          - name: order_delivered_carrier_date
            description: "Timestamp when the order was delivered by the carrier."
          - name: order_delivered_customer_date
            description: "Timestamp when the order was delivered by the customer."
          - name: order_estimated_delivery_date
            description: "Estimated date when the order will be delivered."

      - name: products
        description: "Information about products, including product ID, category name, and product name."
        columns:
          - name: product_id
            description: "Identifier for the product."
            tests:
              - unique
              - not_null
          - name: product_category_name
            description: "Category name of the product in Portuguese."
          - name: product_name_lenght
            description: "Length of the product name."
          - name: product_description_lenght
            description: "Length of the product description."
          - name: product_photos_qty
            description: "Quantity of photos available for the product."
          - name: product_weight_g
            description: "Weight of the product in grams."
          - name: product_length_cm
            description: "Length of the product in centimeters."
          - name: product_height_cm
            description: "Height of the product in centimeters."
          - name: product_width_cm
            description: "Width of the product in centimeters."

      - name: sellers
        description: "Information about sellers, including seller ID, zip code prefix, city, and state."
        columns:
          - name: seller_id
            description: "Identifier for the seller."
            tests:
              - unique
              - not_null
          - name: seller_zip_code_prefix
            description: "Zip code prefix of the seller's location."
          - name: seller_city
            description: "City where the seller is located."
          - name: seller_state
            description: "State where the seller is located."