version: 2

models:

    - name: dim_date
      description: "Dimension table for dates, including attributes such as day, month, year, and quarter."
      columns:
        - name: date_id
          description: "The date in YYYY-MM-DD format."
          tests:
            - not_null
            - unique
        - name: year
          description: "The year (e.g., 2024)."
          tests:
            - not_null
        - name: quarter
          description: "The quarter of the year (Q1, Q2, Q3, Q4)."
        - name: month
          description: "The month of the year (1-12)."
        - name: month_name
          description: "The name of the month (e.g., January, February)."
        - name: week
          description: "The week number of the year (1-52)."
        - name: day_of_month
          description: "The day of the month (1-31)."
        - name: day_of_week
          description: "The day of the week (1-7, where 1 is Monday and 7 is Sunday)."
        - name: day_of_week_name
          description: "The name of the day of the week (e.g., Monday, Tuesday)."
        - name: is_weekend
          description: "Boolean indicating whether the date falls on a weekend."
          tests:
            - not_null
            - accepted_values:
                    arguments:
                        values:
                            - TRUE
                            - FALSE
        - name: is_holiday_brazil
          description: "Boolean indicating whether the date is a holiday in Brazil."
          tests:
            - not_null
            - accepted_values:
                    arguments:
                        values:
                            - TRUE
                            - FALSE

    - name: dim_hdi
      description: "Dimension table for Human Development Index (HDI) data, including attributes such as country, education index, wealth index, and health index for the year 2017."
      columns:
        - name: state_id
          description: "The ID of the state."
          tests:
            - unique
            - not_null
            #- relationships:
             #   arguments:
              #      to: ref('dim_states')
               #     field: state_id
        - name: education_index
          description: "The education index for the state in 2017."
        - name: wealth_index
          description: "The wealth index for the state in 2017."
        - name: health_index
          description: "The health index for the state in 2017."

    - name: dim_icu_beds
      description: "ICU bed availability per Brazilian state, sourced from IBGE data. Covers both public (SUS) and private facilities. Used in dim_states to enrich the socioeconomic profile of each state."
      columns:
        - name: state_id
          description: "The ID of the state."
          tests:
            - unique
            - not_null
            #- relationships:
             #   arguments:
              #      to: ref('dim_states')
               #     field: state_id
        - name: public_beds
          description: "Number of ICU beds available in public facilities (SUS) in the state."
        - name: private_beds
          description: "Number of ICU beds available in private facilities in the state."