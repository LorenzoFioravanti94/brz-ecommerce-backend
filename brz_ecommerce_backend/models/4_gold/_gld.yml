version: 2

models:

    - name: dim_date
      description: "Dimension table for dates, including attributes such as day, month, year, and quarter."
      columns:
        - name: date_id
          description: "The date in YYYY-MM-DD format."
          tests:
            - not_null
            - unique
        - name: year
          description: "The year (e.g., 2024)."
        - name: quarter
          description: "The quarter of the year (Q1, Q2, Q3, Q4)."
        - name: month
          description: "The month of the year (1-12)."
        - name: month_name
          description: "The name of the month (e.g., January, February)."
        - name: week
          description: "The week number of the year (1-52)."
        - name: day_of_month
          description: "The day of the month (1-31)."
        - name: day_of_week
          description: "The day of the week (1-7, where 1 is Monday and 7 is Sunday)."
        - name: day_of_week_name
          description: "The name of the day of the week (e.g., Monday, Tuesday)."
        - name: is_weekend
          description: "Boolean indicating whether the date falls on a weekend."
        - name: is_holiday_brazil
          description: "Boolean indicating whether the date is a holiday in Brazil."